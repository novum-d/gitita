name: Article AI Review

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: ai-review-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  ai-review:
    if: >-
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/review'))
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Resolve review target
        id: target
        uses: actions/github-script@v8
        with:
          script: |
            const eventName = context.eventName;
            let shouldRun = false;
            let reason = '';
            let prNumber = null;
            let headSha = null;
            let baseSha = null;
            let prAuthor = null;
            let labels = [];

            if (eventName === 'pull_request') {
              const pr = context.payload.pull_request;
              prNumber = pr.number;
              headSha = pr.head.sha;
              baseSha = pr.base.sha;
              prAuthor = pr.user?.login || '';
              labels = (pr.labels || []).map(label => label.name);
              shouldRun = labels.includes('article');
              reason = 'ready_for_review';
            } else if (eventName === 'issue_comment') {
              const issue = context.payload.issue;
              const body = context.payload.comment?.body || '';
              if (!issue.pull_request || !body.trim().startsWith('/review')) {
                core.setOutput('should_run', 'false');
                core.notice('Skip AI review: not a PR comment or missing /review command.');
                return;
              }
              prNumber = issue.number;
              const {owner, repo} = context.repo;
              const pr = await github.rest.pulls.get({
                owner,
                repo,
                pull_number: prNumber
              });
              headSha = pr.data.head.sha;
              baseSha = pr.data.base.sha;
              prAuthor = pr.data.user?.login || '';
              labels = (pr.data.labels || []).map(label => label.name);
              shouldRun = labels.includes('article');
              reason = 'slash_review';
            }

            core.setOutput('should_run', shouldRun ? 'true' : 'false');
            core.setOutput('pr_number', String(prNumber || ''));
            core.setOutput('head_sha', String(headSha || ''));
            core.setOutput('base_sha', String(baseSha || ''));
            core.setOutput('pr_author', String(prAuthor || ''));
            core.setOutput('reason', reason);
            if (!shouldRun) {
              core.notice("Skip AI review: PR does not have 'article' label.");
            }

      - name: Checkout PR head
        if: steps.target.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.target.outputs.head_sha }}
          fetch-depth: 0

      - name: Comment AI article review
        if: steps.target.outputs.should_run == 'true'
        uses: actions/github-script@v8
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          PR_NUMBER: ${{ steps.target.outputs.pr_number }}
          BASE_SHA: ${{ steps.target.outputs.base_sha }}
          HEAD_SHA: ${{ steps.target.outputs.head_sha }}
          PR_AUTHOR: ${{ steps.target.outputs.pr_author }}
          REVIEW_REASON: ${{ steps.target.outputs.reason }}
        with:
          script: |
            const fs = require('fs');
            const {execSync} = require('child_process');
            const marker = '<!-- gitita-ai-review -->';
            const rules = fs.readFileSync('docs/ai/QIITA_REVIEW_RULES.md', 'utf8');
            const baseSha = process.env.BASE_SHA;
            const headSha = process.env.HEAD_SHA;
            const prNumber = Number(process.env.PR_NUMBER);
            let previewUrl = '(preview URL not found)';

            const changed = execSync(`git diff --name-only ${baseSha} ${headSha} -- articles`, {encoding: 'utf8'});
            const slug = changed
              .split('\n')
              .map(line => line.split('/'))
              .find(parts => parts[0] === 'articles' && parts[1])?.[1];

            if (!slug) {
              core.notice('Skip AI review: no changed article found.');
              return;
            }

            const articlePath = `articles/${slug}/article.md`;
            if (!fs.existsSync(articlePath)) {
              core.notice(`Skip AI review: article file not found for slug ${slug}.`);
              return;
            }

            const article = fs.readFileSync(articlePath, 'utf8');

            function frontmatterValue(name) {
              const match = article.match(new RegExp(`^${name}:\\s*(?:"([^"]*)"|'([^']*)'|([^\\n#]+))`, 'm'));
              const value = (match?.[1] || match?.[2] || match?.[3] || '').trim();
              return value && value !== 'null' ? value : '';
            }

            function previewUrlFromArticle() {
              const author = process.env.PR_AUTHOR || frontmatterValue('author');
              const qiitaId = frontmatterValue('qiita_id');
              if (!author || !qiitaId) return '';
              return `https://qiita.com/${author}/private/${qiitaId}`;
            }

            async function aiReview() {
              const key = process.env.OPENAI_API_KEY;
              if (!key) {
                return [
                  '### 良い点',
                  '- 記事差分は検出できています。',
                  '',
                  '### 提案',
                  '[suggestion] OPENAI_API_KEY が未設定のため、AI レビュー本文は生成されていません。',
                  '',
                  '### 注意点',
                  '- なし'
                ].join('\n');
              }

              const response = await fetch('https://api.openai.com/v1/responses', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${key}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  model: process.env.OPENAI_MODEL,
                  input: [
                    {
                      role: 'system',
                      content: 'Qiita 記事ドラフトだけをレビューしてください。必ず日本語で、簡潔な Markdown セクション「### 良い点」「### 提案」「### 注意点」を返してください。提案は最大 3 件、注意点は最大 2 件にしてください。severity label は [suggestion] と [warning] だけを使ってください。'
                    },
                    {
                      role: 'user',
                      content: `レビュー理由: ${process.env.REVIEW_REASON}\n\nレビュー規則:\n${rules}\n\n記事 Markdown:\n${article}`
                    }
                  ]
                })
              });

              if (!response.ok) {
                const text = await response.text();
                throw new Error(`OpenAI review failed: ${response.status} ${text}`);
              }

              const data = await response.json();
              return data.output_text || data.output?.flatMap(item => item.content || []).map(part => part.text || '').join('\n') || '### 良い点\n- レビュー結果を取得できませんでした。\n\n### 提案\n- なし\n\n### 注意点\n- なし';
            }

            const review = await aiReview();
            const contextPath = 'preview-context/gitita-preview-context.json';
            if (fs.existsSync(contextPath)) {
              try {
                const preview = JSON.parse(fs.readFileSync(contextPath, 'utf8'));
                if (preview?.preview_url) {
                  previewUrl = preview.preview_url;
                }
              } catch (error) {
                core.warning(`Failed to parse preview context: ${error.message}`);
              }
            }
            if (previewUrl === '(preview URL not found)') {
              previewUrl = previewUrlFromArticle() || previewUrl;
            }
            const body = [
              marker,
              '## AI 記事レビュー',
              '',
              `トリガー: ${process.env.REVIEW_REASON}`,
              '',
              'プレビュー:',
              previewUrl,
              '',
              review
            ].join('\n');
            const {owner, repo} = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100
            });
            const existing = comments.find(comment => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              });
            }
