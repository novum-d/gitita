name: Article AI Review

on:
  workflow_run:
    workflows: ["Preview Publish"]
    types: [completed]

permissions:
  contents: read
  actions: read
  issues: write
  pull-requests: read

concurrency:
  group: ai-review-${{ github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  ai-review:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Download preview context
        uses: actions/download-artifact@v5
        with:
          name: gitita-preview-context
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: preview-context

      - name: Require article label on PR
        id: guard
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const preview = JSON.parse(fs.readFileSync('preview-context/gitita-preview-context.json', 'utf8'));
            const {owner, repo} = context.repo;
            const pr = await github.rest.pulls.get({
              owner,
              repo,
              pull_number: preview.pr
            });
            const labels = (pr.data.labels || []).map(label => label.name);
            const hasArticle = labels.includes('article');
            core.setOutput('has_article_label', hasArticle ? 'true' : 'false');
            if (!hasArticle) {
              core.notice(`Skip AI review: PR #${preview.pr} does not have 'article' label.`);
            }

      - name: Checkout preview source
        if: steps.guard.outputs.has_article_label == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Comment AI article review
        if: steps.guard.outputs.has_article_label == 'true'
        uses: actions/github-script@v8
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- gitita-ai-review -->';
            const preview = JSON.parse(fs.readFileSync('preview-context/gitita-preview-context.json', 'utf8'));
            const rules = fs.readFileSync('docs/ai/QIITA_REVIEW_RULES.md', 'utf8');
            const articlePath = `articles/${preview.slug}/article.md`;
            const article = fs.readFileSync(articlePath, 'utf8');

            async function aiReview() {
              const key = process.env.OPENAI_API_KEY;
              if (!key) {
                return [
                  '### Good',
                  '- プレビュー記事の作成または更新は完了しています。',
                  '',
                  '### Suggestions',
                  '[suggestion] OPENAI_API_KEY が設定されていないため、AI による本文レビューは実行されていません。',
                  '',
                  '### Warnings',
                  '- なし'
                ].join('\n');
              }

              const response = await fetch('https://api.openai.com/v1/responses', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${key}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  model: process.env.OPENAI_MODEL,
                  input: [
                    {
                      role: 'system',
                      content: 'You review Qiita article drafts only. Return concise Markdown sections: ### Good, ### Suggestions, ### Warnings. Use at most 3 suggestions and 2 warnings. Only use [suggestion] and [warning] severity labels.'
                    },
                    {
                      role: 'user',
                      content: `Review rules:\n${rules}\n\nPreview URL:\n${preview.preview_url}\n\nArticle Markdown:\n${article}`
                    }
                  ]
                })
              });

              if (!response.ok) {
                const text = await response.text();
                throw new Error(`OpenAI review failed: ${response.status} ${text}`);
              }

              const data = await response.json();
              return data.output_text || data.output?.flatMap(item => item.content || []).map(part => part.text || '').join('\n') || '### Good\n- レビュー結果を取得できませんでした。\n\n### Suggestions\n- なし\n\n### Warnings\n- なし';
            }

            const review = await aiReview();
            const body = [
              marker,
              '## AI Article Review',
              '',
              'Preview:',
              preview.preview_url,
              '',
              review
            ].join('\n');

            const {owner, repo} = context.repo;
            const issue_number = preview.pr;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100
            });
            const existing = comments.find(comment => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
