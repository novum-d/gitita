name: Article Preview Publish

on:
  pull_request:
    types: [ready_for_review, synchronize]

permissions:
  contents: write
  issues: write
  pull-requests: read
  actions: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  preview:
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.actor != 'github-actions[bot]' &&
      contains(github.event.pull_request.labels.*.name, 'article')
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Publish private preview
        id: preview
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://qiita.com/api/v2' }}
          UPLOAD_POLICIES_URL: ${{ vars.UPLOAD_POLICIES_URL || 'https://qiita.com/api/v2/upload/policies' }}
          GITITA_DIFF_BASE: ${{ github.event.pull_request.base.sha }}
          GITITA_DIFF_HEAD: HEAD
        run: |
          set -euo pipefail
          cargo run -- publish --preview 2>&1 | tee /tmp/gitita-preview.log

          published_line="$(grep '^published item:' /tmp/gitita-preview.log | tail -n 1 || true)"
          if [ -z "$published_line" ]; then
            echo "No preview item URL was emitted by gitita publish --preview" >&2
            exit 1
          fi

          slug="$(printf '%s\n' "$published_line" | awk '{print $3}')"
          preview_url="$(printf '%s\n' "$published_line" | awk '{print $5}')"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

          cat > /tmp/gitita-preview-context.json <<EOF
          {
            "pr": ${{ github.event.pull_request.number }},
            "slug": "$slug",
            "preview_url": "$preview_url",
            "head_sha": "${{ github.event.pull_request.head.sha }}"
          }
          EOF

      - name: Commit qiita_id update
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles
          if git diff --cached --quiet; then
            echo "No qiita_id changes to commit."
          else
            git commit -m "chore: update preview qiita_id"
            git push
          fi

      - name: Upload preview context
        uses: actions/upload-artifact@v4
        with:
          name: gitita-preview-context
          path: /tmp/gitita-preview-context.json
          if-no-files-found: error

  ai-review:
    needs: preview
    if: needs.preview.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment AI article review
        uses: actions/github-script@v8
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REVIEW_REASON: preview_publish
        with:
          script: |
            const fs = require('fs');
            const {execSync} = require('child_process');
            const marker = '<!-- gitita-ai-review -->';
            const rules = fs.readFileSync('docs/ai/QIITA_REVIEW_RULES.md', 'utf8');
            const baseSha = process.env.BASE_SHA;
            const headSha = process.env.HEAD_SHA;
            const prNumber = Number(process.env.PR_NUMBER);
            let previewUrl = '(preview URL not found)';

            const changed = execSync(`git diff --name-only ${baseSha} ${headSha} -- articles`, {encoding: 'utf8'});
            const slug = changed
              .split('\n')
              .map(line => line.split('/'))
              .find(parts => parts[0] === 'articles' && parts[1])?.[1];

            if (!slug) {
              core.notice('Skip AI review: no changed article found.');
              return;
            }

            const articlePath = `articles/${slug}/article.md`;
            if (!fs.existsSync(articlePath)) {
              core.notice(`Skip AI review: article file not found for slug ${slug}.`);
              return;
            }

            const article = fs.readFileSync(articlePath, 'utf8');

            const publishedLine = fs.existsSync('/tmp/gitita-preview.log')
              ? fs.readFileSync('/tmp/gitita-preview.log', 'utf8').split('\n').filter(line => line.startsWith('published item: ')).pop()
              : '';
            if (publishedLine) {
              const parts = publishedLine.trim().split(/\s+/);
              if (parts[4] && (parts[4].startsWith('http://') || parts[4].startsWith('https://'))) {
                previewUrl = parts[4];
              }
            }

            async function aiReview() {
              const key = process.env.OPENAI_API_KEY;
              if (!key) {
                return [
                  '### Good',
                  '- 記事差分は検出できています。',
                  '',
                  '### Suggestions',
                  '[suggestion] OPENAI_API_KEY が未設定のため、AI レビュー本文は生成されていません。',
                  '',
                  '### Warnings',
                  '- なし'
                ].join('\n');
              }

              const response = await fetch('https://api.openai.com/v1/responses', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${key}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  model: process.env.OPENAI_MODEL,
                  input: [
                    {
                      role: 'system',
                      content: 'You review Qiita article drafts only. Return concise Markdown sections: ### Good, ### Suggestions, ### Warnings. Use at most 3 suggestions and 2 warnings. Only use [suggestion] and [warning] severity labels.'
                    },
                    {
                      role: 'user',
                      content: `Review reason: ${process.env.REVIEW_REASON}\n\nReview rules:\n${rules}\n\nArticle Markdown:\n${article}`
                    }
                  ]
                })
              });

              if (!response.ok) {
                const text = await response.text();
                throw new Error(`OpenAI review failed: ${response.status} ${text}`);
              }

              const data = await response.json();
              return data.output_text || data.output?.flatMap(item => item.content || []).map(part => part.text || '').join('\n') || '### Good\n- レビュー結果を取得できませんでした。\n\n### Suggestions\n- なし\n\n### Warnings\n- なし';
            }

            const review = await aiReview();
            const body = [
              marker,
              '## AI Article Review',
              '',
              `Trigger: ${process.env.REVIEW_REASON}`,
              '',
              'Preview:',
              previewUrl,
              '',
              review
            ].join('\n');
            const {owner, repo} = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100
            });
            const existing = comments.find(comment => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              });
            }
