name: Article Preview Publish

on:
  pull_request:
    types: [ready_for_review, synchronize]
    paths:
      - 'articles/**'

permissions:
  contents: write
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: preview-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Resolve preview gate
        id: gate
        uses: actions/github-script@v8
        with:
          script: |
            const pr = context.payload.pull_request;
            const labels = (pr.labels || []).map(label => label.name);
            const reasons = [];
            if (pr.draft) reasons.push('draft PR');
            if (pr.head.repo.full_name !== `${context.repo.owner}/${context.repo.repo}`) reasons.push('head repo mismatch');
            if (!labels.includes('article')) reasons.push('missing article label');
            const shouldRun = reasons.length === 0;
            core.setOutput('should_run', shouldRun ? 'true' : 'false');
            if (shouldRun) {
              core.notice('Preview gate passed.');
            } else {
              core.notice(`Preview gate skipped: ${reasons.join(', ')}`);
            }

      - name: Checkout PR branch
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        if: steps.gate.outputs.should_run == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        if: steps.gate.outputs.should_run == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Resolve Qiita token secret
        if: steps.gate.outputs.should_run == 'true'
        id: token
        uses: actions/github-script@v8
        env:
          QIITA_TOKEN_MAP_JSON: ${{ vars.QIITA_TOKEN_MAP_JSON || '' }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        with:
          script: |
            const author = process.env.PR_AUTHOR;
            const fallback = 'QIITA_TOKEN';
            let secretName = fallback;

            const raw = (process.env.QIITA_TOKEN_MAP_JSON || '').trim();
            if (raw) {
              try {
                const map = JSON.parse(raw);
                if (typeof map[author] === 'string' && map[author].trim()) {
                  secretName = map[author].trim();
                } else if (typeof map.default === 'string' && map.default.trim()) {
                  secretName = map.default.trim();
                }
              } catch (error) {
                core.warning(`Failed to parse QIITA_TOKEN_MAP_JSON: ${error.message}`);
              }
            }

            core.notice(`Selected Qiita token secret for ${author}: ${secretName}`);
            core.setOutput('secret_name', secretName);

      - name: Validate resolved Qiita token
        if: steps.gate.outputs.should_run == 'true'
        env:
          QIITA_TOKEN: ${{ secrets[steps.token.outputs.secret_name] }}
        run: |
          set -euo pipefail
          if [ -z "${QIITA_TOKEN:-}" ]; then
            echo "Resolved secret is empty or not found: ${{ steps.token.outputs.secret_name }}" >&2
            exit 1
          fi

      - name: Publish private preview
        if: steps.gate.outputs.should_run == 'true'
        id: preview
        env:
          QIITA_TOKEN: ${{ secrets[steps.token.outputs.secret_name] }}
          API_BASE_URL: ${{ vars.API_BASE_URL || 'https://qiita.com/api/v2' }}
          UPLOAD_POLICIES_URL: ${{ vars.UPLOAD_POLICIES_URL || 'https://qiita.com/api/v2/upload/policies' }}
          GITITA_DIFF_BASE: ${{ github.event.pull_request.base.sha }}
          GITITA_DIFF_HEAD: HEAD
        run: |
          set -euo pipefail
          cargo run -- publish --preview 2>&1 | tee /tmp/gitita-preview.log

          published_line="$(grep '^published item:' /tmp/gitita-preview.log | tail -n 1 || true)"
          if [ -z "$published_line" ]; then
            echo "No preview item URL was emitted by gitita publish --preview" >&2
            exit 1
          fi

          slug="$(printf '%s\n' "$published_line" | awk '{print $3}')"
          preview_url="$(printf '%s\n' "$published_line" | awk '{print $5}')"
          echo "slug=$slug" >> "$GITHUB_OUTPUT"
          echo "preview_url=$preview_url" >> "$GITHUB_OUTPUT"

          cat > /tmp/gitita-preview-context.json <<EOF
          {
            "pr": ${{ github.event.pull_request.number }},
            "slug": "$slug",
            "preview_url": "$preview_url",
            "head_sha": "${{ github.event.pull_request.head.sha }}"
          }
          EOF

      - name: Commit qiita_id update
        if: steps.gate.outputs.should_run == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles
          if git diff --cached --quiet; then
            echo "No qiita_id changes to commit."
          else
            git commit -m "chore: update preview qiita_id"
            git push
          fi

      - name: Upload preview context
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: gitita-preview-context
          path: /tmp/gitita-preview-context.json
          if-no-files-found: error

  ai-review:
    needs: preview
    if: needs.preview.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v5
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download preview context
        uses: actions/download-artifact@v4
        with:
          name: gitita-preview-context
          path: preview-context

      - name: Comment AI article review
        uses: actions/github-script@v8
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4.1-mini' }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REVIEW_REASON: preview_publish
        with:
          script: |
            const fs = require('fs');
            const {execSync} = require('child_process');
            const marker = '<!-- gitita-ai-review -->';
            const rules = fs.readFileSync('docs/ai/QIITA_REVIEW_RULES.md', 'utf8');
            const baseSha = process.env.BASE_SHA;
            const headSha = process.env.HEAD_SHA;
            const prNumber = Number(process.env.PR_NUMBER);
            let previewUrl = '(preview URL not found)';

            const changed = execSync(`git diff --name-only ${baseSha} ${headSha} -- articles`, {encoding: 'utf8'});
            const slug = changed
              .split('\n')
              .map(line => line.split('/'))
              .find(parts => parts[0] === 'articles' && parts[1])?.[1];

            if (!slug) {
              core.notice('Skip AI review: no changed article found.');
              return;
            }

            const articlePath = `articles/${slug}/article.md`;
            if (!fs.existsSync(articlePath)) {
              core.notice(`Skip AI review: article file not found for slug ${slug}.`);
              return;
            }

            const article = fs.readFileSync(articlePath, 'utf8');

            function frontmatterValue(name) {
              const match = article.match(new RegExp(`^${name}:\\s*(?:"([^"]*)"|'([^']*)'|([^\\n#]+))`, 'm'));
              const value = (match?.[1] || match?.[2] || match?.[3] || '').trim();
              return value && value !== 'null' ? value : '';
            }

            function previewUrlFromArticle() {
              const author = process.env.PR_AUTHOR || frontmatterValue('author');
              const qiitaId = frontmatterValue('qiita_id');
              if (!author || !qiitaId) return '';
              return `https://qiita.com/${author}/private/${qiitaId}`;
            }

            async function aiReview() {
              const key = process.env.OPENAI_API_KEY;
              if (!key) {
                return [
                  '### 良い点',
                  '- 記事差分は検出できています。',
                  '',
                  '### 提案',
                  '[suggestion] OPENAI_API_KEY が未設定のため、AI レビュー本文は生成されていません。',
                  '',
                  '### 注意点',
                  '- なし'
                ].join('\n');
              }

              const response = await fetch('https://api.openai.com/v1/responses', {
                method: 'POST',
                headers: {
                  'Authorization': `Bearer ${key}`,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                  model: process.env.OPENAI_MODEL,
                  input: [
                    {
                      role: 'system',
                      content: 'Qiita 記事ドラフトだけをレビューしてください。必ず日本語で、簡潔な Markdown セクション「### 良い点」「### 提案」「### 注意点」を返してください。提案は最大 3 件、注意点は最大 2 件にしてください。severity label は [suggestion] と [warning] だけを使ってください。'
                    },
                    {
                      role: 'user',
                      content: `レビュー理由: ${process.env.REVIEW_REASON}\n\nレビュー規則:\n${rules}\n\n記事 Markdown:\n${article}`
                    }
                  ]
                })
              });

              if (!response.ok) {
                const text = await response.text();
                throw new Error(`OpenAI review failed: ${response.status} ${text}`);
              }

              const data = await response.json();
              return data.output_text || data.output?.flatMap(item => item.content || []).map(part => part.text || '').join('\n') || '### 良い点\n- レビュー結果を取得できませんでした。\n\n### 提案\n- なし\n\n### 注意点\n- なし';
            }

            const review = await aiReview();
            const contextPath = 'preview-context/gitita-preview-context.json';
            if (fs.existsSync(contextPath)) {
              try {
                const preview = JSON.parse(fs.readFileSync(contextPath, 'utf8'));
                if (preview?.preview_url) {
                  previewUrl = preview.preview_url;
                }
              } catch (error) {
                core.warning(`Failed to parse preview context: ${error.message}`);
              }
            }
            if (previewUrl === '(preview URL not found)') {
              previewUrl = previewUrlFromArticle() || previewUrl;
            }
            const body = [
              marker,
              '## AI 記事レビュー',
              '',
              `トリガー: ${process.env.REVIEW_REASON}`,
              '',
              'プレビュー:',
              previewUrl,
              '',
              review
            ].join('\n');
            const {owner, repo} = context.repo;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100
            });
            const existing = comments.find(comment => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body
              });
            }
